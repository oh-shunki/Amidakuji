{% extends 'base.html' %}

{% block title %}④ユーザ認証画面）{% endblock %}

{% block header %}
    {% if title %}<h4>{{ title }}</h4>{% endif %}
{% endblock %}

{% block content %}
<form method="post" class="amidaForm">
    <div>
        <label class="form-label text-nowrap" for="user_password">パスワードを入力してください</label>
    </div>

    <div class="mb-2 d-flex justify-content-center gap-2">
        <input type="password" class="form-control" id="user_password" name="user_password" placeholder="********">
        <button type='submit' class='btn btn-primary text-nowrap'>OK</button>
    </div>

    {% for message in get_flashed_messages() %}
        <div class="alert alert-info alert-dismissible fade show" role="error">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    {% endfor %}
</form>
{% endblock %}
