{% extends 'base.html' %}

{% block content %}

	<form method="post">
		<!-- フォームはここ -->

		<!-- これはエラーメッセージの表示（あれば） -->
		{% for message in get_flashed_messages() %}

		{% endfor %}

{% endblock %}
